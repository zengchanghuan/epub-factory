name: Deploy to AWS EC2 (via SSM)

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1
          mask-aws-account-id: 'no' # 帮助我们查错

      - name: Package project
        run: |
          ZIP_FILE="epub-factory.zip"
          zip -r "$ZIP_FILE" . \
              -x "*.git*" -x "*__pycache__*" -x "*.venv*" -x "*.env" \
              -x "$ZIP_FILE" -x "backend/uploads/*" -x "backend/outputs/*" \
              -x "backend/*.db*" -x "./*.epub" -x "*.epub" \
              -x "tools/epubcheck.zip" -x ".cursor/*" -x "*.pem"

      - name: Upload to S3
        run: |
          aws s3 cp epub-factory.zip s3://epub-factory-deploy-326709068290/epub-factory.zip

      - name: Deploy via SSM RunCommand
        run: |
          INSTANCE_ID="i-0bc1b7632e9cda9b4"
          # 生成一个 10 分钟有效的预签名 URL
          PRESIGN_URL=$(aws s3 presign s3://epub-factory-deploy-326709068290/epub-factory.zip --expires-in 600)
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[
                \"set -e\",
                \"echo '--- Downloading from S3 ---'\",
                \"curl -sL -o /home/ubuntu/epub-factory.zip '$PRESIGN_URL'\",
                \"echo '--- Extracting ---'\",
                \"cd /home/ubuntu\",
                \"unzip -o epub-factory.zip -d epub-factory > /dev/null\",
                \"chown -R ubuntu:ubuntu /home/ubuntu/epub-factory\",
                \"echo '--- Updating Dependencies ---'\",
                \"cd /home/ubuntu/epub-factory/backend\",
                \"if [ ! -d .venv ]; then python3.11 -m venv .venv; fi\",
                \"sudo -u ubuntu .venv/bin/pip install -r requirements.txt | tail -5\",
                \"echo '--- Restarting Services ---'\",
                \"if systemctl list-unit-files | grep -q epub-factory.service; then systemctl restart epub-factory; else pkill -f uvicorn || true; sleep 1; sudo -u ubuntu bash -c 'cd /home/ubuntu/epub-factory/backend && nohup .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > /home/ubuntu/deploy.log 2>&1 &'; fi\",
                \"if systemctl list-unit-files | grep -q epub-factory-worker.service; then systemctl restart epub-factory-worker; fi\",
                \"echo '--- Done ---'\"
            ]}" \
            --query "Command.CommandId" --output text)
          
          echo "Deployment command sent: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"

      - name: Health Check
        run: |
          # 等待几秒让服务启动
          sleep 10
          curl -sf https://fixepub.com/health || curl -sf https://fixepub.com/ || (echo "Health check failed" && exit 1)
