# ─────────────────────────────────────────────────────────────────────────────
# requirements.lock — 与生产环境完全一致的依赖快照（含传递依赖）
#
# 用途：本地/CI 复刻线上依赖树，消除「本地能跑、线上不行」类不一致。
# 基准：腾讯云生产机 ~/epub-factory/backend/.venv 的 `pip freeze`
# Python：3.10.12（见 .python-version；解释器版本不一致是最大坑，务必先对齐）
# 生成：2026-06-25
#
# 重建本地环境（需先 `pyenv install 3.10.12`）：
#   cd backend
#   python -m venv .venv && source .venv/bin/activate
#   pip install -r requirements.lock
#
# 注意：
# - requirements.txt 仍是「人类维护的直接依赖（部分用 >=）」；本文件是「机器锁定的完整快照」。
# - 升级依赖时改 requirements.txt 安装后，再在生产同版本环境重新 `pip freeze > requirements.lock`。
# - pip 管不到系统级依赖：java（epubcheck）、calibre（ebook-convert）需在机器/镜像层单独保证。
# ─────────────────────────────────────────────────────────────────────────────
