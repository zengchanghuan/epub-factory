version: "2026.05.18"
license: "internal"
domain: "risky"
description: "上下文高度相关的歧义词，仅供 L4 LLM 精校扫描使用，不在 L2/L3 中做替换"
entries:
  # 含义完全相反的
  - {tw: "窩心", note: "台湾=贴心温暖；大陆=委屈郁闷。必须上下文判断"}
  - {tw: "糗", note: "台湾=出丑尴尬；大陆=倒霉、窝囊。需上下文"}
  # 词性/含义随语境变化
  - {tw: "機車", note: "台湾=摩托车（名词）或形容人难搞（口语）；大陆通常只有摩托车义"}
  - {tw: "打的", note: "台湾少用；大陆=打车/叫出租车"}
  - {tw: "班房", note: "台湾=教室/班级；大陆=监狱"}
  - {tw: "土豆", note: "台湾=花生；大陆=土豆/马铃薯"}
  - {tw: "搞", note: "台湾/大陆均用，但语感和搭配有差异"}
  - {tw: "窗口", note: "台湾可指操作系统视窗（Windows窗口）；大陆也有此义但更多指实体窗口"}
  - {tw: "爸爸桑", note: "台湾特有用法，指酒店老板"}
  - {tw: "阿莎力", note: "台湾用语，指爽快大方"}
  - {tw: "意思意思", note: "两岸语感不同"}
  - {tw: "牛肉麵", note: "台湾=红烧牛肉面；大陆多写牛肉面"}
  # 动词用法差异
  - {tw: "服務", note: "台湾口语有时指性服务；大陆服务业语境正常使用"}
  - {tw: "照起工", note: "台湾闽南语影响的用法，大陆不用"}
  - {tw: "有夠", note: "台湾口语=非常、很；大陆不常用"}
  - {tw: "超", note: "台湾口语=非常（超厉害）；大陆也有此用法但频率不同"}
  # 新词/流行语
  - {tw: "嗆聲", note: "台湾=呛声/挑衅；大陆也有但语气略不同"}
  - {tw: "靠北", note: "台湾粗口，需要上下文确认是否保留或替换"}
  - {tw: "三八", note: "台湾=神经兮兮；大陆=妇女节或贬义词，需上下文"}
  - {tw: "屁孩", note: "两岸都有，但语气和使用场景略有差异"}
  - {tw: "哈哈哈", note: "通用，无需处理"}
